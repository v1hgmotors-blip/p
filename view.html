<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한결모터스 차량 위치 안내</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:#0F1E33;color:#fff;
    min-height:100vh;padding:14px 12px 40px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .top-title{
    text-align:center;font-size:16px;font-weight:900;color:#FEE500;
    padding:8px 0 14px;letter-spacing:-.3px;
  }
  /* 차량번호/차량위치 헤더 — 팝업과 동일 스타일 */
  .car-header{
    display:none;
    font-size:16px;font-weight:900;color:#E8590C;text-align:center;
    background:#fff;border:2.5px solid #E03131;border-radius:12px;
    padding:10px 12px;margin-bottom:12px;letter-spacing:-.3px;line-height:1.45;
  }
  /* ★ 담당차주 줄 — 팝업과 동일 (남색 칩 + 연두 글씨 + 전화걸기) */
  .owner-line{
    display:none;
    align-items:center;gap:10px;flex-wrap:wrap;
    font-size:14px;font-weight:900;color:#7CE38B;
    background:#16305A;border-radius:12px;
    padding:10px 14px;margin-bottom:12px;letter-spacing:-.3px;
  }
  .owner-call{
    background:#16A34A;color:#fff;text-decoration:none;
    padding:8px 16px;border-radius:9px;font-size:13px;font-weight:900;
  }
  .panel{
    background:#1E3A5F;border-radius:14px;padding:14px 16px;margin-bottom:12px;
  }
  .panel-title{font-size:13px;font-weight:900;color:#FEE500;margin-bottom:10px;}
  .step-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .step-num{
    flex-shrink:0;width:24px;height:24px;border-radius:50%;
    background:#FF8C00;color:#fff;font-size:12px;font-weight:900;
    display:flex;align-items:center;justify-content:center;
  }
  .step-txt{flex:1;font-size:14px;font-weight:700;line-height:1.55;padding-top:2px;}
  .map-box{
    background:#fff;border-radius:14px;padding:8px;margin-bottom:12px;
    display:none;
  }
  .map-box img{width:100%;height:auto;display:block;border-radius:8px;}
  .status{
    text-align:center;font-size:14px;font-weight:800;color:#94A3B8;
    padding:30px 10px;line-height:1.7;
  }
  .spin{
    display:inline-block;width:26px;height:26px;border-radius:50%;
    border:3px solid #334E75;border-top-color:#FEE500;
    animation:sp 0.9s linear infinite;margin-bottom:10px;
  }
  @keyframes sp{to{transform:rotate(360deg);}}
  .foot{
    text-align:center;font-size:11px;font-weight:700;color:#64748B;margin-top:18px;
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="top-title" id="topTitle">🚗 한결모터스 차량 위치 안내</div>
  <!-- ★ 업체정보 (현황판 설정바 🏢업체정보에서 입력) -->
  <div id="bizInfo" style="display:none;text-align:center;font-size:13px;font-weight:800;color:#BFDBFE;line-height:1.7;margin:-6px 0 14px;padding:0 8px;white-space:pre-line;"></div>
  <!-- ★ 제휴점 정보 (현황판 제휴점 편집 → 상세 정보) — 줄에 전화번호가 있으면 전화걸기 버튼 -->
  <div id="promoBox" style="display:none;background:#16305A;border:1.5px solid #3B5C8F;border-radius:12px;padding:12px 14px;margin:0 0 14px;">
    <div id="promoLines"></div>
  </div>
  <div class="car-header" id="carHeader"></div>
  <!-- ★ 담당차주 + 전화걸기 -->
  <div class="owner-line" id="ownerLine">
    <span id="ownerTxt"></span>
    <a class="owner-call" id="ownerCall" href="#" style="display:none;">📞 전화걸기</a>
  </div>

  <div class="panel" id="routePanel" style="display:none;">
    <div class="panel-title">📋 경로 안내</div>
    <div id="routeSteps"></div>
  </div>

  <div class="map-box" id="mapBox">
    <img id="mapImg" alt="약도">
  </div>

  <div class="status" id="statusMsg"><span class="spin"></span><br>약도를 불러오는 중입니다...</div>

  <!-- ★ 다운로드 / 공유 버튼 -->
  <div id="actionBtns" style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
    <button onclick="dlMap()" style="flex:1;min-width:100px;padding:13px 8px;background:#166534;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">⬇️ 다운로드</button>
    <button onclick="dlMapOnly()" style="flex:1;min-width:90px;padding:13px 8px;background:#0369A1;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">🗺️ 약도만</button>
    <button onclick="sharePage()" style="flex:1;min-width:80px;padding:13px 8px;background:#6D28D9;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">📤 공유</button>
  </div>
  <div class="foot" id="footTxt">한결모터스 주차현황판 · 위치 안내</div>
</div>

<!-- html2canvas (화면 전체 다운로드용) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ★ 화면 전체 다운로드 — 제휴점/차량위치/담당차주/경로/약도를 한 장으로 저장
   html2canvas 로드 실패 시 약도 사진만 저장 (폴백) */
function _dlFallbackMapOnly(){
  try{
    var img = document.getElementById('mapImg');
    if(img && img.src && img.src.indexOf('data:image')===0){
      var a=document.createElement('a');
      a.href=img.src; a.download='약도_차량위치안내.png';
      document.body.appendChild(a); a.click(); a.remove();
      return true;
    }
  }catch(e){}
  return false;
}
/* ★ 약도 사진 1장만 다운로드 */
function dlMapOnly(){
  if(!_dlFallbackMapOnly()){
    alert('다운로드할 약도 사진이 없습니다.');
  }
}
function dlMap(){
  var btns = document.getElementById('actionBtns');
  var wrap = document.getElementById('wrap');
  if(typeof html2canvas === 'undefined' || !wrap){
    if(!_dlFallbackMapOnly()) alert('다운로드에 실패했습니다.');
    return;
  }
  /* 캡처 중 버튼은 잠깐 숨김 (결과 이미지에 버튼이 안 나오게) */
  if(btns) btns.style.visibility = 'hidden';
  html2canvas(wrap, {
    backgroundColor: '#0F1E33',
    scale: 2,                 /* 고해상도 */
    useCORS: true,
    logging: false
  }).then(function(canvas){
    if(btns) btns.style.visibility = '';
    var a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = '차량위치안내_전체.png';
    document.body.appendChild(a); a.click(); a.remove();
  }).catch(function(e){
    if(btns) btns.style.visibility = '';
    if(!_dlFallbackMapOnly()) alert('다운로드에 실패했습니다.');
  });
}
/* ★ 페이지 공유 — 약도 이미지 + 위치 텍스트 + 링크 (카톡/문자 등 선택) */
function sharePage(){
  var hdr = (document.getElementById('carHeader')||{}).textContent || '차량 위치 안내';
  var own = (document.getElementById('ownerTxt')||{}).textContent || '';
  var txt = hdr + (own ? '\n' + own : '');
  var img = document.getElementById('mapImg');
  var doShare = function(files){
    var data = { title: document.title, text: txt, url: location.href };
    if(files) data.files = files;
    navigator.share(data).catch(function(e){
      if(e && e.name !== 'AbortError'){ fallbackCopy(); }
    });
  };
  var fallbackCopy = function(){
    try{
      navigator.clipboard.writeText(txt + '\n' + location.href).then(function(){
        alert('링크가 복사되었습니다. 카톡/문자에 붙여넣어 공유하세요.');
      });
    }catch(e){ alert('공유가 지원되지 않는 브라우저입니다.'); }
  };
  if(!navigator.share){ fallbackCopy(); return; }
  /* 약도 이미지가 있으면 파일로 첨부 시도 */
  if(img && img.src && img.src.indexOf('data:image')===0 && navigator.canShare){
    try{
      fetch(img.src).then(function(r){ return r.blob(); }).then(function(b){
        var f = new File([b], '약도.png', {type: b.type||'image/png'});
        if(navigator.canShare({files:[f]})){ doShare([f]); }
        else { doShare(null); }
      }).catch(function(){ doShare(null); });
    }catch(e){ doShare(null); }
  } else {
    doShare(null);
  }
}
(function(){
  function qs(k){
    try{ return new URLSearchParams(location.search).get(k) || ''; }catch(e){ return ''; }
  }
  var code = qs('code') || qs('c');
  var part = qs('part');
  var car  = qs('car');
  var loc  = qs('loc');
  var db   = qs('db') || 'https://hg-motors-default-rtdb.firebaseio.com';
  var lkey = qs('k');   /* ★ 단축링크 키 — Firebase에서 상세정보를 읽어옴 */
  var bz   = qs('bz');  /* ★ 업체명 — 현황판 타이틀에서 자동 전달됨 */
  function applyBiz(name){
    if(!name) return;
    try{
      document.getElementById('topTitle').textContent = '🚗 ' + name + ' 차량 위치 안내';
      document.title = name + ' 차량 위치 안내';
      var f = document.getElementById('footTxt');
      if(f) f.textContent = name + ' 주차현황판 · 위치 안내';
    }catch(e){}
  }
  applyBiz(bz);
  /* ★ 업체정보 텍스트 (여러 줄 지원) */
  function applyBizInfo(info){
    if(!info) return;
    try{
      var el = document.getElementById('bizInfo');
      el.textContent = String(info);
      el.style.display = 'block';
    }catch(e){}
  }
  applyBizInfo(qs('bi'));
  /* ★ 제휴점 정보 — 줄별 표시, 전화번호(010~) 포함 줄엔 📞 전화걸기 버튼 */
  function applyPromo(info){
    if(!info) return;
    try{
      var box = document.getElementById('promoLines');
      box.innerHTML = '';
      var _lines = String(info).split(/\n/).map(function(l){return l.trim();}).filter(Boolean);
      _lines.forEach(function(line, idx){
        var m = line.match(/01[016789][\s\-\.]?\d{3,4}[\s\-\.]?\d{4}/);
        var row = document.createElement('div');
        if(m){
          /* 전화번호 줄: 좌측 텍스트(줄바꿈 허용) + 우측 전화걸기 버튼 (겹침 방지) */
          row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;font-weight:800;color:#E2E8F0;line-height:1.55;padding:5px 0;'+(idx>0?'border-top:1px solid #24446E;':'');
          var span = document.createElement('span');
          span.style.cssText = 'flex:1;min-width:0;word-break:break-word;';
          span.textContent = line;
          var tel = m[0].replace(/[^0-9]/g,'');
          var a = document.createElement('a');
          a.href = 'tel:' + tel;
          a.textContent = '📞 전화걸기';
          a.style.cssText = 'flex-shrink:0;background:#16A34A;color:#fff;text-decoration:none;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:900;white-space:nowrap;';
          row.appendChild(span); row.appendChild(a);
        } else {
          /* 일반 줄(제목 등): 가운데 정렬 */
          row.style.cssText = 'text-align:center;font-size:14px;font-weight:900;color:#FEE500;line-height:1.7;padding:2px 0 6px;';
          row.textContent = line;
        }
        box.appendChild(row);
      });
      if(box.children.length){
        document.getElementById('promoBox').style.display = 'block';
      }
    }catch(e){}
  }
  applyPromo(qs('pt'));

  var statusEl = document.getElementById('statusMsg');
  function showStatus(html){ statusEl.innerHTML = html; statusEl.style.display='block'; }
  function hideStatus(){ statusEl.style.display='none'; }

  /* 차량번호/차량위치 헤더 — 링크 파라미터에서 즉시 표시 (통신 전에 먼저 보임) */
  if(car || loc){
    var h = document.getElementById('carHeader');
    h.textContent = '차량번호:' + (car||'-') + '  차량위치:' + (loc||'-');
    h.style.display = 'block';
  }

  /* ★ 담당차주 — 링크 파라미터(on=이름, op=전화)에서 표시 + 전화걸기 */
  var oName = qs('on');
  var oPhone = (qs('op')||'').replace(/[^0-9]/g,'');

  /* 헤더/담당차주 렌더 함수 (단축링크에서도 재사용) */
  var keyNo = qs('kn'); /* ★ 차량 키번호 */
  function renderHeader(){
    if(car || loc){
      var h = document.getElementById('carHeader');
      h.textContent = '차량번호:' + (car||'-') + '  차량위치:' + (loc||'-');
      /* ★ 키번호 — 녹색 글씨로 헤더 끝에 표시 */
      if(keyNo){
        var kSpan = document.createElement('span');
        kSpan.style.cssText = 'color:#15803D;font-weight:900;';
        kSpan.textContent = ' (키번호는 ' + keyNo + '번입니다)';
        h.appendChild(kSpan);
      }
      h.style.display = 'block';
    }
    if(oName || oPhone){
      var fmtP = oPhone;
      if(oPhone.length===11) fmtP = oPhone.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
      else if(oPhone.length===10) fmtP = oPhone.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
      document.getElementById('ownerTxt').textContent =
        '👤 담당차주: ' + (oName||'-') + (oPhone ? '  📞 ' + fmtP : '');
      var oc = document.getElementById('ownerCall');
      if(oPhone){ oc.href = 'tel:' + oPhone; oc.style.display = 'inline-block'; }
      document.getElementById('ownerLine').style.display = 'flex';
    }
  }
  renderHeader();

  if(!code || (!part && !lkey)){
    showStatus('⚠️ 잘못된 링크입니다.<br>QR을 다시 스캔해 주세요.');
    return;
  }

  var loadedAny = false;
  var fdb = null;
  try{
    firebase.initializeApp({ databaseURL: db });
    fdb = firebase.database();
  }catch(e){
    showStatus('⚠️ 연결 오류가 발생했습니다.<br>다시 스캔해 주세요.');
    return;
  }

  /* 파트의 경로 안내 + 약도 사진 로드
     ★ 사진(합성 약도)에는 경로안내가 이미 포함되어 있으므로,
       사진이 있으면 페이지 경로 패널에는 주소 줄(길찾기 버튼)만 표시해 중복 제거 */
  function _isAddr(t){
    t = String(t||'');
    if(/주소\s*[:：]/.test(t)) return true;
    var hasArea = /(시|군|구)\s*[가-힣]/.test(t);
    var hasRoad = /(로|길)\s*\d/.test(t);              /* 도로명: ~로/길 + 번지 */
    var hasJibun = /[가-힣](동|리|읍|면|가)\s*\d/.test(t); /* 지번: ~동/리 + 번지 */
    return hasArea && (hasRoad || hasJibun);
  }
  function _renderSteps(steps, addrOnly){
    var valid = (steps||[]).filter(function(x){ return x && x.text && String(x.text).trim(); });
    var rows = addrOnly ? valid.filter(function(x){ return _isAddr(x.text); }) : valid;
    if(!rows.length) return false;
    var box = document.getElementById('routeSteps');
    box.innerHTML = '';
    rows.forEach(function(x,i){
      var row = document.createElement('div'); row.className='step-row';
      var num = document.createElement('div'); num.className='step-num';
      num.textContent = addrOnly ? '📍' : (i+1);
      if(addrOnly){ num.style.background='#16A34A'; }
      var txt = document.createElement('div'); txt.className='step-txt';
      var stepText = String(x.text).trim();
      txt.textContent = stepText;
      if(_isAddr(stepText)){
        var q = stepText.replace(/^.*?주소\s*[:：]\s*/,'').trim();
        var nav = document.createElement('a');
        nav.href = 'https://map.kakao.com/link/search/' + encodeURIComponent(q);
        nav.target = '_blank';
        nav.textContent = '🗺️ 길찾기';
        nav.style.cssText = 'display:inline-block;margin-left:8px;background:#16A34A;color:#fff;text-decoration:none;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:900;vertical-align:middle;white-space:nowrap;';
        txt.appendChild(nav);
      }
      row.appendChild(num); row.appendChild(txt);
      box.appendChild(row);
    });
    document.getElementById('routePanel').style.display = 'block';
    return true;
  }
  function loadPart(){
    Promise.all([
      fdb.ref('kd_rooms/'+code+'/pb_part_steps/'+part).once('value').then(function(s){ return s.val(); }).catch(function(){ return null; }),
      fdb.ref('kd_rooms/'+code+'/pb_part_photos/'+part).once('value').then(function(s){ return s.val(); }).catch(function(){ return null; })
    ]).then(function(res){
      var stepsRaw = res[0], photo = res[1];
      var steps = [];
      try{
        if(typeof stepsRaw === 'string'){ steps = JSON.parse(stepsRaw||'[]'); }
        else if(Array.isArray(stepsRaw)){ steps = stepsRaw; }
      }catch(e){}
      var hasPhoto = (typeof photo === 'string' && photo.indexOf('data:image') === 0);

      /* 사진 표시 */
      if(hasPhoto){
        var img = document.getElementById('mapImg');
        img.src = photo;
        document.getElementById('mapBox').style.display = 'block';
        loadedAny = true; hideStatus();
      }
      /* 경로 패널: 사진 있으면 주소만(중복 제거), 없으면 전체 표시 */
      var shown = _renderSteps(steps, hasPhoto);
      if(shown){ loadedAny = true; hideStatus(); }

      if(!loadedAny){
        showStatus('약도 사진이 아직 등록되지 않았습니다.<br>위 경로 안내를 참고해 주세요.');
      }
    }).catch(function(){
      if(!loadedAny) showStatus('⚠️ 약도를 불러오지 못했습니다.<br>네트워크 상태를 확인해 주세요.');
    });
  }

  if(lkey){
    /* ★ 단축링크: 상세정보(part/car/loc/담당차주)를 Firebase에서 읽어옴 */
    fdb.ref('kd_rooms/'+code+'/links/'+lkey).once('value').then(function(snap){
      var d = snap.val();
      if(d && typeof d === 'object'){
        part = String(d.part||part||'');
        car = String(d.car||car||'');
        loc = String(d.loc||loc||'');
        oName = String(d.on||oName||'');
        oPhone = String(d.op||oPhone||'').replace(/[^0-9]/g,'');
        keyNo = String(d.kn||keyNo||''); /* ★ 키번호 */
        applyBiz(d.bz); /* ★ 업체명 */
        applyBizInfo(d.bi); /* ★ 업체정보 */
        applyPromo(d.pt); /* ★ 제휴점 정보 */
        renderHeader();
      }
      if(part){ loadPart(); }
      else { showStatus('⚠️ 링크 정보가 만료되었거나 없습니다.'); }
    }).catch(function(){
      showStatus('⚠️ 링크 정보를 불러오지 못했습니다.<br>네트워크를 확인해 주세요.');
    });
  } else {
    loadPart();
  }

  /* 12초 안전장치 */
  setTimeout(function(){
