<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한결모터스 차량 위치 안내</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:#0F1E33;color:#fff;
    min-height:100vh;padding:14px 12px 40px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .top-title{
    text-align:center;font-size:16px;font-weight:900;color:#FEE500;
    padding:10px 0 14px;letter-spacing:-.3px;line-height:1.35;
  }
  /* 차량번호/차량위치 헤더 — 팝업과 동일 스타일 */
  .car-header{
    display:none;
    font-size:18px;font-weight:900;color:#E8590C;text-align:center;
    background:#fff;border:2.5px solid #E03131;border-radius:12px;
    padding:14px 14px;margin-bottom:12px;letter-spacing:-.3px;line-height:1.5;
  }
  /* ★ 차량이 더 이상 존재하지 않을 때(출고됨 등) 안내 스타일 */
  .car-header.gone{
    color:#475569;background:#F1F5F9;border-color:#94A3B8;font-size:17px;font-weight:800;line-height:1.7;
  }
  /* ★ 슬롯 메모 (실시간) */
  .slot-memo{
    display:none;font-size:13px;font-weight:700;color:#FDE68A;
    background:#3A2E1A;border-radius:10px;padding:9px 12px;margin-bottom:12px;line-height:1.6;
  }
  /* ★ 담당차주 줄 — 팝업과 동일 (남색 칩 + 연두 글씨 + 전화걸기) */
  .owner-line{
    display:none;
    align-items:center;gap:8px;flex-wrap:nowrap;
    font-size:14px;font-weight:900;color:#7CE38B;
    background:#16305A;border-radius:12px;
    padding:10px 12px;margin-bottom:12px;letter-spacing:-.3px;
  }
  .owner-line #ownerTxt{ flex:1;min-width:0;line-height:1.3; }
  .owner-call{
    flex-shrink:0;white-space:nowrap;
    background:#16A34A;color:#fff;text-decoration:none;
    padding:7px 11px;border-radius:9px;font-size:13px;font-weight:900;
  }
  .panel{
    background:#1E3A5F;border-radius:14px;padding:16px 16px;margin-bottom:12px;
  }
  .panel-title{font-size:16px;font-weight:900;color:#FEE500;margin-bottom:12px;}
  .step-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
  .step-num{
    flex-shrink:0;width:30px;height:30px;border-radius:50%;
    background:#FF8C00;color:#fff;font-size:15px;font-weight:900;
    display:flex;align-items:center;justify-content:center;
  }
  .step-txt{flex:1;font-size:17px;font-weight:800;line-height:1.6;padding-top:2px;color:#F1F5F9;letter-spacing:-.2px;}
  .map-box{
    background:#fff;border-radius:14px;padding:8px;margin-bottom:12px;
    display:none;
  }
  .map-box img{width:100%;height:auto;display:block;border-radius:8px;}
  .status{
    text-align:center;font-size:14px;font-weight:800;color:#94A3B8;
    padding:30px 10px;line-height:1.7;
  }
  .spin{
    display:inline-block;width:26px;height:26px;border-radius:50%;
    border:3px solid #334E75;border-top-color:#FEE500;
    animation:sp 0.9s linear infinite;margin-bottom:10px;
  }
  @keyframes sp{to{transform:rotate(360deg);}}
  /* ★ 출고서류 박스 — 차량번호 깜박임 */
  @keyframes docCarNoBlink{
    0%,100%{opacity:1;}
    50%{opacity:.25;}
  }
  #docCarNo.blink{
    animation:docCarNoBlink 1s ease-in-out infinite;
  }
  .foot{
    text-align:center;font-size:11px;font-weight:700;color:#64748B;margin-top:18px;
  }
  /* ★ 주차위치 보기 토글 버튼 — 눈에 확 띄도록 (접힘 상태에서 은은하게 깜빡임) */
  @keyframes parkLocPulse{
    0%,100%{ box-shadow:0 3px 10px rgba(245,158,11,.40); transform:scale(1); }
    50%    { box-shadow:0 6px 22px rgba(245,158,11,.85); transform:scale(1.025); }
  }
  #parkLocToggle{
    width:100%;margin:4px 0 12px;padding:11px 12px;border:none;border-radius:14px;
    font-size:19px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:-.3px;
    transition:background .2s, box-shadow .2s;
  }
  #parkLocToggle.closed{
    background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#3a2600;
    text-shadow:0 1px 0 rgba(255,255,255,.35);
    animation:parkLocPulse 1.5s ease-in-out infinite;
  }
  #parkLocToggle.open{
    background:#334155;color:#fff;animation:none;box-shadow:none;
  }
  /* ★ 자동 약도 격자 셀 */
  #autoMapBox table{ border-collapse:separate;border-spacing:4px;margin:0 auto; }
  .amCell{
    width:30px;height:30px;min-width:30px;background:#EEF2F7;
    border:1.5px solid #CBD5E1;border-radius:6px;text-align:center;
    vertical-align:middle;padding:0;font-size:15px;line-height:30px;
  }
  .amTarget{
    background:#E03131;border-color:#B91C1C;color:#fff;font-weight:900;
    animation:amPulse 1.2s ease-in-out infinite;
  }
  .amNear{
    font-size:9px;font-weight:800;color:#334155;letter-spacing:-.5px;
    background:#DBEAFE;border-color:#93C5FD;
    line-height:1.15;white-space:normal;word-break:break-all;
    padding:1px;vertical-align:middle;
  }
  .amEmpty{ font-size:12px; opacity:.45; }  /* ★ 차량번호 없는 칸의 🅿️ */
  @keyframes amPulse{
    0%,100%{ box-shadow:0 0 0 2px rgba(224,49,49,.30); }
    50%    { box-shadow:0 0 0 6px rgba(224,49,49,.55); }
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="top-title" id="topTitle">🚗 한결모터스 차량 위치 안내</div>
  <!-- ★ 업체정보 (현황판 설정바 🏢업체정보에서 입력) -->
  <div id="bizInfo" style="display:none;text-align:center;font-size:14px;font-weight:800;color:#BFDBFE;line-height:1.7;margin:-5px 0 14px;padding:0 8px;white-space:pre-line;"></div>
  <div class="car-header" id="carHeader"></div>
  <!-- ★★ 출고서류 다운로드/인쇄/공유 (차량번호·위치 헤더 바로 아래) -->
  <div id="docBox" style="display:none;background:#0F2A4A;border:1.5px solid #2563EB;border-radius:12px;padding:12px 14px;margin:0 0 14px;">
    <div style="position:relative;font-size:15px;font-weight:900;color:#93C5FD;margin-bottom:12px;line-height:1.5;min-height:24px;">📄 출고서류<span id="docCarNo" class="blink" style="position:absolute;left:0;right:0;text-align:center;color:#FDE68A;font-size:17px;pointer-events:none;"></span></div>
    <div id="docNoneMsg" style="display:none;font-size:13px;font-weight:800;color:#FCA5A5;line-height:1.6;background:#3A1D1D;border-radius:8px;padding:10px 12px;margin-bottom:10px;">● 출고서류는 한결모터스 사무실로 문의 주세요!</div>
    <div id="docBtnRow" style="display:flex;gap:6px;flex-wrap:nowrap;">
      <button onclick="docAction('download')" style="flex:1;min-width:0;padding:13px 4px;background:#166534;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;white-space:nowrap;">⬇️ 서류다운로드</button>
      <button onclick="docAction('share')" style="flex:1;min-width:0;padding:13px 4px;background:#6D28D9;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;white-space:nowrap;">📤 서류공유</button>
      <button id="commonDocBtn" onclick="downloadCommonDocs()" style="display:none;flex:1;min-width:0;padding:13px 4px;background:#B45309;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;white-space:nowrap;">📄 판매확인서</button>
    </div>
    <!-- 출고서류 선택 리스트 (다운로드 시 표시) -->
    <div id="docPickList" style="display:none;margin-top:10px;background:#0B1F38;border-radius:10px;padding:10px;"></div>
    <div id="docStatus" style="font-size:11px;color:#94A3B8;font-weight:700;margin-top:8px;"></div>
  </div>
  <!-- ★ 담당차주 + 전화걸기 -->
  <div class="owner-line" id="ownerLine">
    <span id="ownerTxt"></span>
    <a class="owner-call" id="ownerCall" href="#" style="display:none;">📞 전화걸기</a>
  </div>

  <!-- ★ 주차위치(약도) 접기/펴기 토글 버튼 (담당차주 바로 아래) -->
  <button id="parkLocToggle" class="closed" onclick="toggleParkLoc()">📍 주차위치 보기 ▾</button>
  <!-- ★ 슬롯 메모 (실시간) -->
  <div class="slot-memo" id="slotMemoBox"></div>

  <!-- ★ 주차위치 영역 (경로안내 + 약도 + 다운/공유 버튼) — 주차위치보기 버튼으로 접기/펴기, 기본 접힘 -->
  <div id="parkLocWrap" style="display:none;">
    <div class="panel" id="routePanel" style="display:none;">
      <div class="panel-title">📋 경로 안내</div>
      <div id="routeSteps"></div>
    </div>

    <!-- ★ 자동 약도 (실시간 정확한 위치 — 항상 먼저 표시) -->
    <div id="autoMapBox" onclick="zoomAutoMap()" style="display:none;background:#fff;border-radius:14px;padding:12px 10px;margin-bottom:12px;cursor:zoom-in;"></div>

    <!-- ★ 관리자가 등록한 사진/약도 (자동 약도 아래에 표시) -->
    <div class="map-box" id="mapBox">
      <img id="mapImg" alt="약도" onclick="zoomMap()" style="cursor:zoom-in;">
      <div style="text-align:center;font-size:11px;color:#94A3B8;font-weight:700;padding:4px 0 2px;">🔍 약도를 누르면 크게 볼 수 있습니다</div>
    </div>

    <div class="status" id="statusMsg"><span class="spin"></span><br>약도를 불러오는 중입니다...</div>

    <!-- ★ 다운로드 / 공유 버튼 -->
    <div id="actionBtns" style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
      <button onclick="dlMap()" style="flex:1;min-width:100px;padding:13px 8px;background:#166534;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">⬇️ 현재화면다운</button>
      <button onclick="dlMapOnly()" style="flex:1;min-width:90px;padding:13px 8px;background:#0369A1;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">🗺️ 약도만</button>
      <button onclick="sharePage()" style="flex:1;min-width:80px;padding:13px 8px;background:#6D28D9;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">📤 공유</button>
    </div>
  </div>

  <!-- ★ 약도 전체화면 확대 뷰 (가로로 돌리면 화면 가득) — 접기 영역 밖에 위치 -->
  <div id="mapZoom" onclick="closeZoom()" style="display:none;position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.95);align-items:center;justify-content:center;">
    <img id="mapZoomImg" style="max-width:100%;max-height:100%;object-fit:contain;">
    <div style="position:absolute;top:14px;right:18px;color:#fff;font-size:30px;font-weight:900;">✕</div>
  </div>
  <!-- ★ 제휴점 정보 (하단 표시) -->
  <div id="promoBox" style="display:none;background:#16305A;border:1.5px solid #3B5C8F;border-radius:12px;padding:12px 14px;margin:16px 0 0;">
    <div id="promoLines"></div>
  </div>
  <!-- ★ 이 약도 링크 복사 -->
  <button id="viewCopyLinkBtn" onclick="copyViewLink()" style="width:100%;margin:16px 0 0;padding:13px;background:#0369A1;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">🔗 이 약도 링크 복사</button>
  <div style="text-align:center;font-size:11px;font-weight:700;color:#94A3B8;margin-top:6px;line-height:1.5;">복사해서 카톡·메모에 저장하면<br>나중에 다시 약도를 볼 수 있습니다</div>
  <div class="foot" id="footTxt">한결모터스 주차현황판 · 위치 안내</div>
</div>

<!-- html2canvas (화면 전체 다운로드용) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ★ 화면 전체 다운로드 — 제휴점/차량위치/담당차주/경로/약도를 한 장으로 저장
   html2canvas 로드 실패 시 약도 사진만 저장 (폴백) */
function _dlFallbackMapOnly(){
  try{
    var box = document.getElementById('mapBox');
    var img = document.getElementById('mapImg');
    /* ★ 사진 박스가 실제 표시 중일 때만 — 자동 약도로 전환된 뒤 남아있는 옛 사진 다운 방지 */
    var boxVisible = box && box.style.display !== 'none';
    if(boxVisible && img && img.src && img.src.indexOf('data:image')===0){
      var a=document.createElement('a');
      a.href=img.src; a.download='약도_차량위치안내.png';
      document.body.appendChild(a); a.click(); a.remove();
      return true;
    }
  }catch(e){}
  return false;
}
/* ★ 약도 사진 1장만 다운로드 — 등록 사진이 있으면 사진을,
   자동 약도(격자)가 표시 중이면 격자를 이미지로 캡처해 저장 */
function dlMapOnly(){
  /* 1) 등록 사진이 있으면 사진 다운로드 */
  if(_dlFallbackMapOnly()) return;
  /* 2) 자동 약도(격자)가 표시 중이면 격자 캡처 다운로드 (전체 폭) */
  var am = document.getElementById('autoMapBox');
  var amVisible = am && am.style.display !== 'none' && am.innerHTML;
  if(amVisible && typeof html2canvas !== 'undefined'){
    _captureAutoMap(function(url){
      if(!url){ alert('약도 이미지 생성에 실패했습니다.'); return; }
      var a=document.createElement('a');
      a.href=url;
      a.download='약도_차량위치안내.png';
      document.body.appendChild(a); a.click(); a.remove();
    });
    return;
  }
  alert('다운로드할 약도가 없습니다.');
}
function dlMap(){
  var btns = document.getElementById('actionBtns');
  var wrap = document.getElementById('wrap');
  if(typeof html2canvas === 'undefined' || !wrap){
    if(!_dlFallbackMapOnly()) alert('다운로드에 실패했습니다.');
    return;
  }
  /* 캡처 중 버튼은 잠깐 숨김 (결과 이미지에 버튼이 안 나오게) */
  if(btns) btns.style.visibility = 'hidden';
  /* ★ FIX: windowWidth/width를 wrap의 실제 렌더링 너비로 고정
     — 지정하지 않으면 html2canvas가 내부적으로 더 넓은 가상 뷰포트를 가정해
       wrap(max-width:720px, margin:0 auto)이 가운데 정렬되며 좌우에 여백이 생김 */
  var _w = wrap.scrollWidth, _h = wrap.scrollHeight;
  html2canvas(wrap, {
    backgroundColor: '#0F1E33',
    scale: 2,                 /* 고해상도 */
    useCORS: true,
    logging: false,
    width: _w,
    height: _h,
    windowWidth: _w,
    windowHeight: _h
  }).then(function(canvas){
    if(btns) btns.style.visibility = '';
    var a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = '차량위치안내_전체.png';
    document.body.appendChild(a); a.click(); a.remove();
  }).catch(function(e){
    if(btns) btns.style.visibility = '';
    if(!_dlFallbackMapOnly()) alert('다운로드에 실패했습니다.');
  });
}
/* ★ 약도 전체화면 확대 (가로로 돌리면 화면 가득) */
/* ★ 자동 약도(격자) 전체 폭 캡처 — 격자가 박스 안에서 가로 스크롤될 때
   보이는 부분만 찍히는 문제 해결: 안쪽 스크롤 영역의 실제 폭으로 캡처 */
function _captureAutoMap(onDone){
  var am = document.getElementById('autoMapBox');
  if(!am || am.style.display==='none' || !am.innerHTML || typeof html2canvas==='undefined'){ onDone(null); return; }
  var inner = am.querySelector('div[style*="overflow"]');
  var fullW = Math.max(am.scrollWidth, (inner ? inner.scrollWidth + 24 : 0));
  html2canvas(am, {
    backgroundColor:'#ffffff', scale:2, useCORS:true, logging:false,
    width:fullW, height:am.scrollHeight,
    windowWidth:fullW, windowHeight:am.scrollHeight,
    onclone:function(doc){
      /* 복제본에서 박스를 전체 폭으로 펼치고 스크롤 잘림 해제 */
      try{
        var c=doc.getElementById('autoMapBox');
        if(c){
          c.style.width=fullW+'px'; c.style.maxWidth='none';
          var ic=c.querySelector('div[style*="overflow"]');
          if(ic){ ic.style.overflow='visible'; ic.style.width='auto'; }
        }
      }catch(e){}
    }
  }).then(function(canvas){ onDone(canvas.toDataURL('image/png')); })
    .catch(function(){ onDone(null); });
}
function zoomMap(){
  var z = document.getElementById('mapZoom');
  var zi = document.getElementById('mapZoomImg');
  var src = (document.getElementById('mapImg')||{}).src;
  if(!src) return;
  zi.src = src;
  z.style.display = 'flex';
}
/* ★ 자동 약도(격자) 탭 → 전체화면 크게 보기 (전체 폭 캡처) */
var _autoZoomCache = null; /* {html:격자HTML, img:dataURL} — 같은 내용이면 재캡처 생략 */
function zoomAutoMap(){
  var am = document.getElementById('autoMapBox');
  if(!am || am.style.display==='none' || !am.innerHTML) return;
  /* 확대해 보는 동안 자동 접힘 방지 — 타이머 재시작 */
  try{ if(typeof _parkLocTimer!=='undefined' && _parkLocTimer){ clearTimeout(_parkLocTimer); _parkLocTimer=setTimeout(function(){ collapseParkLoc(); }, 30000); } }catch(e){}
  var z = document.getElementById('mapZoom');
  var zi = document.getElementById('mapZoomImg');
  if(_autoZoomCache && _autoZoomCache.html===am.innerHTML){
    zi.src=_autoZoomCache.img; z.style.display='flex'; return;
  }
  _captureAutoMap(function(url){
    if(!url) return;
    _autoZoomCache={ html:am.innerHTML, img:url };
    zi.src=url; z.style.display='flex';
  });
}
function closeZoom(){
  var z = document.getElementById('mapZoom');
  if(z) z.style.display = 'none';
}

/* ★ 주차위치(약도) 접기/펴기 — 기본 접힘, 펴면 20초 후 자동으로 다시 접힘 */
var _parkLocTimer = null;
function _setParkLocBtn(open){
  var b = document.getElementById('parkLocToggle');
  if(!b) return;
  if(open){ b.className = 'open';   b.innerHTML = '📍 주차위치 접기 ▴'; }
  else    { b.className = 'closed'; b.innerHTML = '📍 주차위치 보기 ▾'; }
}
function collapseParkLoc(){
  var w = document.getElementById('parkLocWrap');
  if(w) w.style.display = 'none';
  if(_parkLocTimer){ clearTimeout(_parkLocTimer); _parkLocTimer = null; }
  _setParkLocBtn(false);
}
function expandParkLoc(){
  var w = document.getElementById('parkLocWrap');
  if(w) w.style.display = 'block';
  _setParkLocBtn(true);

  /* 차량번호/차량위치 헤더 — 링크 파라미터에서 즉시 표시 (통신 전에 먼저 보임) */

  var oName = qs('on');
  var oPhone = (qs('op')||'').replace(/[^0-9]/g,'');

  /* 헤더/담당차주 렌더 함수 (단축링크에서도 재사용) */
  var keyNo = qs('kn'); /* ★ 차량 키번호 */
  function _hEsc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }
  function renderHeader(){

    if(car || loc){
      /* ★ 차량번호를 녹색 볼드로 강조 */

      document.getElementById('ownerTxt').innerHTML =

  }
  /* ★ 슬롯 메모 — 요청에 따라 화면에 표시하지 않음 (항상 숨김) */

  function showCarGone(){

  renderHeader();

  var loadedAny = false;

  /* ★★ 실시간 반영 — 위치/키번호/담당차주/메모를 pb_slots·pb_settings 실시간 리스너로 추적
     (링크에 담긴 스냅샷이 아니라, 지금 이 순간의 현황판 데이터를 그대로 따라감)
     차량이 슬롯에서 사라지면(출고 등) 안내 문구로 전환됨 */
  var _lastPartLoaded = null;
  function _maybeReloadPart(newPart){
    if(newPart && String(newPart) !== String(_lastPartLoaded)){
      _lastPartLoaded = newPart;

      document.getElementById('mapBox').style.display = 'none';

      loadPart();

  function startLiveTracking(targetCar){
    var carD = String(targetCar||'').replace(/[^0-9]/g,'');
    if(!carD || !fdb) return;
    var _liveSlots=null, _liveSettings=null;
    function recompute(){
      if(_liveSlots===null || _liveSettings===null) return; /* 두 값 다 도착할 때까지 대기 */
      var slots=_liveSlots, st=_liveSettings;
      var slotKey=null, slot=null, keys=Object.keys(slots);
      for(var i=0;i<keys.length;i++){
        var s0=slots[keys[i]];
        var d0=String((s0&&s0.car)||'').replace(/[^0-9]/g,'');
        if(d0 && d0===carD){ slotKey=keys[i]; slot=s0; break; }
      }
      if(!slot && carD.length>=4){
        var l4=carD.slice(-4);
        for(var j=0;j<keys.length;j++){
          var s1=slots[keys[j]];
          var d1=String((s1&&s1.car)||'').replace(/[^0-9]/g,'');
          if(d1 && d1.slice(-4)===l4){ slotKey=keys[j]; slot=s1; break; }
        }
      }
      if(!slot){ showCarGone(); return; }
      var numParts=parseInt(st.numParts)||3, defC=parseInt(st.colsPerPart)||10, defR=parseInt(st.rowsPerPart)||4;
      var pC=[],pR=[],pO=[],off=0;
      for(var p=1;p<=numParts;p++){
        var c=parseInt(st.partColCounts&&st.partColCounts[String(p)])||defC;
        var r=parseInt(st.partRowCounts&&st.partRowCounts[String(p)])||defR;
        pC.push(c);pR.push(r);pO.push(off);off+=c*r;
      }
      var pi=-1, col=0, row=-1;
      var cm=String(slotKey||'').match(/^C_(\d+)_(\d+)_(\d+)$/);
      if(cm){
        pi=parseInt(cm[1],10)-1; col=parseInt(cm[2],10); row=parseInt(cm[3],10)-1;
      } else {
        var gi=parseInt(slotKey,10);
        if(!isNaN(gi)){
          for(var q=0;q<numParts;q++){ if(gi>=pO[q]&&gi<pO[q]+pC[q]*pR[q]){pi=q;break;} }
          if(pi>=0){ var local=gi-pO[pi]; col=(local%pC[pi])+1; row=Math.floor(local/pC[pi]); }
        }
      }
      var newLoc='', newPart=null;
      if(pi>=0 && pi<numParts && col>=1 && row>=0){
        var fb=pR[pi]-row;
        var pl=(st.partLabels&&(st.partLabels[String(pi+1)]||st.partLabels[pi+1]))||((pi+1)+'파트');
        var cn=(st.colNames&&st.colNames['p'+(pi+1)+'c'+col])||(col+'열');
        newLoc=pl+'-'+cn+'번 (줄)'+(fb>=1&&fb<=pR[pi]?' '+fb+'번째 칸':'');
        newPart=pi+1;
        /* ★ 자동 약도용 격자 정보 저장 */
        var _cnames=[];
        for(var _cc=1;_cc<=pC[pi];_cc++){
          _cnames.push((st.colNames&&st.colNames['p'+(pi+1)+'c'+_cc])||(_cc+'열'));
        }
        var _ccolors=[];
        for(var _cd=1;_cd<=pC[pi];_cd++){
          _ccolors.push((st.colColors&&st.colColors['p'+(pi+1)+'c'+_cd])||null);
        }
        _autoMapData = { partLabel:pl, cols:pC[pi], rows:pR[pi], col:col, row:row, fb:fb, colNames:_cnames, colColors:_ccolors };
        /* ★ 같은 파트의 다른 칸 차량번호 지도 (자동 약도 주변 표시용) */
        var _cellCars={};
        for(var z=0;z<keys.length;z++){
          var sz=slots[keys[z]]; if(!sz) continue;
          var carRaw=String(sz.car||'').trim(); if(!carRaw) continue;
          var carz=carRaw.replace(/[^0-9]/g,'');
          var pz=-1,cz=0,rz=-1;
          var cmz=String(keys[z]).match(/^C_(\d+)_(\d+)_(\d+)$/);
          if(cmz){ pz=parseInt(cmz[1],10)-1; cz=parseInt(cmz[2],10); rz=parseInt(cmz[3],10)-1; }
          else{
            var giz=parseInt(keys[z],10);
            if(!isNaN(giz)){
              for(var qz=0;qz<numParts;qz++){ if(giz>=pO[qz]&&giz<pO[qz]+pC[qz]*pR[qz]){pz=qz;break;} }
              if(pz>=0){ var lz=giz-pO[pz]; cz=(lz%pC[pz])+1; rz=Math.floor(lz/pC[pz]); }
            }
          }
          if(pz===pi && cz>=1 && rz>=0){
            /* ★ 표시 라벨: 숫자 차량번호면 끝 4자리, "청운임대1" 같은 이름이면 원문 그대로(최대 6자) */
            var _lbl;
            if(carz && carz.length>=3 && carRaw.length<=carz.length+1){ _lbl=carz.slice(-4); }
            else { _lbl=carRaw.length>8 ? carRaw.slice(0,8) : carRaw; }
            _cellCars[cz+'_'+rz]=_lbl;
          }
        }
        _autoMapData.cellCars=_cellCars;
      }
      /* ★ 실시간 값으로 전역 상태 갱신 */
      car = targetCar;
      loc = newLoc;
      keyNo = String((slot&&slot.num)||'').trim();
      oName = String((slot&&slot.owner)||'').trim();
      oPhone = String((slot&&slot.ownerPhone)||'').replace(/[^0-9]/g,'');
      if(!oPhone){
        var m=(String((slot&&slot.memo)||'')+' '+String((slot&&slot.owner)||'')).match(/01[016789][\s\-\.]?\d{3,4}[\s\-\.]?\d{4}/);
        if(m) oPhone=m[0].replace(/[^0-9]/g,'');
      }
      renderHeader();
      renderMemo(String((slot&&slot.memo)||'').trim());
      drawAutoMap(); /* ★ 사진 유무와 상관없이 항상 자동 약도 갱신 */
      if(newPart) _maybeReloadPart(newPart);
    }
    fdb.ref('kd_rooms/'+code+'/pb_slots').on('value', function(snap){ _liveSlots = snap.val()||{}; recompute(); });
    fdb.ref('kd_rooms/'+code+'/pb_settings').on('value', function(snap){ _liveSettings = snap.val()||{}; try{ if(window._applyPromoFromSettings) window._applyPromoFromSettings(_liveSettings); }catch(e){} recompute(); });
  }

  /* 파트의 경로 안내 + 약도 사진 로드
     ★ 사진(합성 약도)에는 경로안내가 이미 포함되어 있으므로,
       사진이 있으면 페이지 경로 패널에는 주소 줄(길찾기 버튼)만 표시해 중복 제거 */
  function _isAddr(t){
    t = String(t||'');
    if(/주소\s*[:：]/.test(t)) return true;
    var hasArea = /(시|군|구)\s*[가-힣]/.test(t);
    var hasRoad = /(로|길)\s*\d/.test(t);              /* 도로명: ~로/길 + 번지 */
    var hasJibun = /[가-힣](동|리|읍|면|가)\s*\d/.test(t); /* 지번: ~동/리 + 번지 */
    return hasArea && (hasRoad || hasJibun);
  }
  function _renderSteps(steps, addrOnly){
    var valid = (steps||[]).filter(function(x){ return x && x.text && String(x.text).trim(); });
    var rows = addrOnly ? valid.filter(function(x){ return _isAddr(x.text); }) : valid;
    if(!rows.length) return false;
    var box = document.getElementById('routeSteps');
    box.innerHTML = '';
    rows.forEach(function(x,i){
      var row = document.createElement('div'); row.className='step-row';
      var num = document.createElement('div'); num.className='step-num';
      num.textContent = addrOnly ? '📍' : (i+1);
      if(addrOnly){ num.style.background='#16A34A'; }
      var txt = document.createElement('div'); txt.className='step-txt';
      var stepText = String(x.text).trim();
      txt.textContent = stepText;
      if(_isAddr(stepText)){
        var q = stepText.replace(/^.*?주소\s*[:：]\s*/,'').trim();
        var nav = document.createElement('a');
        nav.href = 'https://map.kakao.com/link/search/' + encodeURIComponent(q);
        nav.target = '_blank';
        nav.textContent = '🗺️ 길찾기';
        nav.style.cssText = 'display:inline-block;margin-left:8px;background:#16A34A;color:#fff;text-decoration:none;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:900;vertical-align:middle;white-space:nowrap;';
        txt.appendChild(nav);
      }
      row.appendChild(num); row.appendChild(txt);
      box.appendChild(row);
    });
    document.getElementById('routePanel').style.display = 'block';
    return true;
  }
  /* ★ HTML 이스케이프 (열 이름 등 안전 출력) */
  function _esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }
  /* ★ 배경색 밝기에 따라 글자색(검정/흰색) 자동 선택 */
  function _pickTextColor(hex){
    try{
      var h=String(hex).replace('#','');
      if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
      var r=parseInt(h.substr(0,2),16), g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
      var yiq=(r*299+g*587+b*114)/1000;
      return yiq>=140 ? '#1e293b' : '#ffffff';
    }catch(e){ return '#1e293b'; }
  }
  /* ★ 자동 약도 숨기기 */
  function _hideAutoMap(){
    var box=document.getElementById('autoMapBox');
    if(box) box.style.display='none';
    _autoMapShown=false;
  }
  /* ★ 자동 약도 그리기 — 현황판 격자(열×줄) 기반, 본인 차 칸만 📍 표시.
     데이터 준비 전이면 false 반환(호출측이 안내문구 유지).
     ★ FIX: 관리자가 등록한 사진/약도가 있어도 함께 표시하도록 변경
       (실시간으로 정확한 현재 위치를 보여주는 자동 약도는 항상 유용하므로) */
  function drawAutoMap(){
    var box=document.getElementById('autoMapBox');
    if(!box) return false;
    var d=_autoMapData;
    if(!d || !d.cols || !d.rows || d.col<1 || d.row<0){ return false; }
    var cols=d.cols, rows=d.rows, html='';
    if(_partHasPhoto===true){
      html+='<div style="text-align:center;font-size:11px;font-weight:900;color:#0369A1;background:#E0F2FE;border-radius:8px;padding:5px 8px;margin-bottom:8px;">🔴 실시간 자동 약도 (현재 정확한 위치)</div>';
    }
    html+='<div style="text-align:center;font-weight:900;color:#1e293b;font-size:15px;margin-bottom:2px;">🅿️ '+_esc(d.partLabel||'')+'</div>';
    html+='<div style="text-align:center;color:#64748b;font-size:11px;font-weight:700;margin-bottom:10px;">📍 빨간 칸이 고객님 차량 위치입니다</div>';
    html+='<div style="overflow-x:auto;"><table><tbody>';
    for(var r=0;r<rows;r++){
      var kan=rows-r; /* 칸 번호(아래부터) */
      html+='<tr><td style="font-size:10px;font-weight:800;color:#475569;white-space:nowrap;padding:0 4px;text-align:right;">'+kan+'칸</td>';
      for(var c2=1;c2<=cols;c2++){
        var isT=(c2===d.col && r===d.row);
        if(isT){ html+='<td class="amCell amTarget">📍</td>'; continue; }
        /* ★ 모든 주차 칸의 차량번호 표시 (특수문자 포함). 차주정보는 표시 안 함 */
        var _cn2 = d.cellCars ? d.cellCars[c2+'_'+r] : null;
        if(_cn2){ html+='<td class="amCell amNear">'+_esc(_cn2)+'</td>'; }
        else{ html+='<td class="amCell amEmpty">🅿️</td>'; }  /* ★ 차량번호 없는 칸 → 🅿️ */
      }
      html+='</tr>';
    }
    /* ★ 하단에도 열 이름 반복 표시 (지정된 열 색상 반영) */
    html+='<tr><td></td>';
    for(var cf=1;cf<=cols;cf++){
      var cnf=(d.colNames&&d.colNames[cf-1])||(cf+'열');
      var ccl=(d.colColors&&d.colColors[cf-1])||null;
      var _cstyle='font-size:10px;font-weight:800;color:#475569;text-align:center;padding:2px 3px;white-space:nowrap;';
      if(ccl){ _cstyle='font-size:10px;font-weight:800;color:'+_pickTextColor(ccl)+';text-align:center;padding:3px 4px;white-space:nowrap;background:'+_esc(ccl)+';border-radius:5px;'; }
      html+='<td style="'+_cstyle+'">'+_esc(cnf)+'</td>';
    }
    html+='</tr>';
    html+='</tbody></table></div>';
    html+='<div style="text-align:center;font-size:11px;color:#94A3B8;font-weight:700;padding:6px 0 0;">🔍 약도를 누르면 크게 볼 수 있습니다</div>';
    box.innerHTML=html;
    box.style.display='block';
    hideStatus();
    loadedAny=true;
    _autoMapShown=true;
    return true;
  }
  /* ★ 경로안내·약도사진 실시간 구독 — 관리자가 내용을 수정하면 열려있는 화면에도 즉시 반영.
     파트가 바뀌면 이전 파트 구독을 해제하고 새 파트를 구독(중복 구독 방지) */
  var _stepsRef=null, _photoRef=null, _liveStepsRaw=null, _livePhoto=null, _partRecv=0;
  function _renderPartData(){
    if(_partRecv < 2) return; /* steps·photo 둘 다 최소 1회 수신 후 렌더 */
    var stepsRaw=_liveStepsRaw, photo=_livePhoto;
    var steps = [];
    try{
      if(typeof stepsRaw === 'string'){ steps = JSON.parse(stepsRaw||'[]'); }
      else if(Array.isArray(stepsRaw)){ steps = stepsRaw; }
    }catch(e){}
    var hasPhoto = (typeof photo === 'string' && photo.indexOf('data:image') === 0);
    _partHasPhoto = hasPhoto; /* ★ 사진 유무 기록 */

    /* 사진 표시 — ★ FIX: 사진이 있어도 자동 약도를 숨기지 않고 함께 표시 */
    if(hasPhoto){
      var img = document.getElementById('mapImg');
      img.src = photo;
      document.getElementById('mapBox').style.display = 'block';
      loadedAny = true; hideStatus();
    } else {
      document.getElementById('mapBox').style.display = 'none';
    }
    /* 경로 패널: 사진 있으면 주소만(중복 제거), 없으면 전체 표시 */
    /* ★ 경로안내는 항상 전체 표시 — 「경로안내만 저장」 문구가 사진 유무와 무관하게 보이도록 */
    var shown = _renderSteps(steps, false);
    if(shown){ loadedAny = true; hideStatus(); }

    /* ★ FIX: 사진 유무와 상관없이 항상 자동 약도(격자)도 함께 표시 —
       사진/경로 안내로도 아무것도 못 보여줄 때만 안내문구 표시 */
    if(!drawAutoMap() && !hasPhoto && !loadedAny){
      showStatus('약도 사진이 아직 등록되지 않았습니다.<br>위 경로 안내를 참고해 주세요.');
    }
  }
  function loadPart(){
    /* 이전 파트 구독 해제 */
    try{ if(_stepsRef) _stepsRef.off(); }catch(e){}
    try{ if(_photoRef) _photoRef.off(); }catch(e){}
    _liveStepsRaw=null; _livePhoto=null; _partRecv=0;
    var _recvS=false, _recvP=false;
    _stepsRef = fdb.ref('kd_rooms/'+code+'/pb_part_steps/'+part);
    _photoRef = fdb.ref('kd_rooms/'+code+'/pb_part_photos/'+part);
    _stepsRef.on('value', function(s){
      _liveStepsRaw = s.val();
      if(!_recvS){ _recvS=true; _partRecv++; }
      _renderPartData();
    }, function(){ if(!_recvS){ _recvS=true; _partRecv++; } _renderPartData(); });
    _photoRef.on('value', function(s){
      _livePhoto = s.val();
      if(!_recvP){ _recvP=true; _partRecv++; }
      _renderPartData();
    }, function(){ if(!_recvP){ _recvP=true; _partRecv++; } _renderPartData(); });
    /* 네트워크 문제로 아무것도 못 받는 경우 안내 (8초) */
    setTimeout(function(){
      if(_partRecv<2 && !loadedAny) showStatus('⚠️ 약도를 불러오지 못했습니다.<br>네트워크 상태를 확인해 주세요.');
    }, 8000);
  }

  if(lkey){
    /* ★ 단축링크: 상세정보(part/car/loc/담당차주)를 Firebase에서 읽어옴 */
    fdb.ref('kd_rooms/'+code+'/links/'+lkey).once('value').then(function(snap){
      var d = snap.val();
      /* ★ 유효기간 3일 — 생성(d.t) 후 3일 지나면 만료 안내 */
      if(d && typeof d === 'object' && d.t){
        var _ageMs = Date.now() - Number(d.t);
        var _limitMs = 3 * 24 * 60 * 60 * 1000; /* 3일 */
        if(_ageMs > _limitMs){
          showStatus('⏰ 유효기간이 만료된 링크입니다.<br>이 안내는 발송 후 3일까지만 열람할 수 있습니다.<br>매장으로 문의해 주세요.');
          return;
        }
      }
      if(d && typeof d === 'object'){
        part = String(d.part||part||'');
        car = String(d.car||car||'');
        loc = String(d.loc||loc||'');
        oName = String(d.on||oName||'');
        oPhone = String(d.op||oPhone||'').replace(/[^0-9]/g,'');
        keyNo = String(d.kn||keyNo||''); /* ★ 키번호 */
        loadCarDocs(car); /* ★ 출고서류 — 차량번호 기준 조회 */
        applyBiz(d.bz); /* ★ 업체명 */
        applyBizInfo(d.bi); /* ★ 업체정보 */
        applyPromo(d.pt); /* ★ 제휴점 정보 */
        renderHeader();
      }
      if(car){ startLiveTracking(car); _logScan(car); } else { _logScan(''); } /* ★ 실시간 반영 + 스캔기록 */
      _lastPartLoaded = part;
      if(part){ loadPart(); }
      else { showStatus('⚠️ 링크 정보가 만료되었거나 없습니다.'); }
    }).catch(function(){
      showStatus('⚠️ 링크 정보를 불러오지 못했습니다.<br>네트워크를 확인해 주세요.');
    });
  } else {
    if(car){ startLiveTracking(car); _logScan(car); } /* ★ 실시간 반영 시작 + 스캔기록 */
    _lastPartLoaded = part;
    loadPart();
  }

  /* 12초 안전장치 */
  setTimeout(function(){
    if(!loadedAny) showStatus('⚠️ 약도를 불러오지 못했습니다.<br>네트워크 상태를 확인 후 다시 스캔해 주세요.');
  }, 12000);
})();
</script><!-- ★ 버전 표시 (하단 좌측) — 캐시 옛 버전 실행 여부 확인용 -->
